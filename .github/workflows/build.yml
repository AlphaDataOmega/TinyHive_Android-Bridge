name: Build & Sign APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build Debug APK
        run: gradle assembleDebug

      # Upload debug APK BEFORE the release-signing path so it lands as
      # an artifact even when the keystore secrets aren't configured.
      # Debug builds are auto-signed by AGP with the Android debug
      # keystore — installable for sideloading, not Play-Store eligible.
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tinyhive-bridge-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Sign Release APK
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Fail loudly if signing secrets aren't configured rather than
          # let apksigner emit a cryptic "unexpected parameter" error.
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Signing secrets not configured. Set KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD in the repo's GitHub Actions secrets. See PUBLISHING.md for instructions. The debug APK is still uploaded above for sideload installs."
            exit 1
          fi

          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

          # Find the unsigned APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          SIGNED_APK="app/build/outputs/apk/release/tinyhive-bridge-signed.apk"

          # Sign the APK
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${KEYSTORE_PASSWORD} \
            --ks-key-alias ${KEY_ALIAS} \
            --key-pass pass:${KEY_PASSWORD} \
            --out ${SIGNED_APK} \
            ${UNSIGNED_APK}

          # Verify signature
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner verify ${SIGNED_APK}

          # Clean up keystore
          rm keystore.jks

      - name: Upload Signed Release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tinyhive-bridge-release
          path: app/build/outputs/apk/release/tinyhive-bridge-signed.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/tinyhive-bridge-signed.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build AAB for Play Store
  build-aab:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build Release Bundle (AAB)
        run: gradle bundleRelease

      - name: Sign AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

          UNSIGNED_AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          SIGNED_AAB="app/build/outputs/bundle/release/tinyhive-bridge-signed.aab"

          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass ${KEYSTORE_PASSWORD} \
            -keypass ${KEY_PASSWORD} \
            -signedjar ${SIGNED_AAB} \
            ${UNSIGNED_AAB} \
            ${KEY_ALIAS}

          rm keystore.jks

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: tinyhive-bridge-aab
          path: app/build/outputs/bundle/release/tinyhive-bridge-signed.aab

      - name: Add AAB to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/bundle/release/tinyhive-bridge-signed.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
